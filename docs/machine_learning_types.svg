<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="supervised" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="unsupervised" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="reinforcement" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="semi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- 标题 -->
  <text x="450" y="52" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">机器学习的主要类型</text>
  <text x="450" y="78" text-anchor="middle" fill="#aaa" font-size="14">Types of Machine Learning</text>

  <!-- 中心节点 -->
  <circle cx="450" cy="165" r="52" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-width="2"/>
  <text x="450" y="160" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">机器学习</text>
  <text x="450" y="180" text-anchor="middle" fill="#ccc" font-size="12">Machine Learning</text>

  <!-- 连接线 -->
  <line x1="398" y1="185" x2="160" y2="270" stroke="#667eea" stroke-width="2" opacity="0.6"/>
  <line x1="430" y1="210" x2="370" y2="270" stroke="#f093fb" stroke-width="2" opacity="0.6"/>
  <line x1="470" y1="210" x2="530" y2="270" stroke="#4facfe" stroke-width="2" opacity="0.6"/>
  <line x1="502" y1="185" x2="740" y2="270" stroke="#43e97b" stroke-width="2" opacity="0.6"/>

  <!-- ========== 1. 监督学习 ========== -->
  <g filter="url(#shadow)">
    <rect x="30" y="270" width="260" height="320" rx="14" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <rect x="30" y="270" width="260" height="50" rx="14" fill="url(#supervised)"/>
    <rect x="30" y="306" width="260" height="14" fill="url(#supervised)"/>
  </g>
  <text x="60" y="302" fill="#fff" font-size="18" font-weight="bold">📊 监督学习</text>
  <text x="160" y="345" text-anchor="middle" fill="#b0b0d0" font-size="13">用标注数据训练模型</text>
  <text x="160" y="365" text-anchor="middle" fill="#b0b0d0" font-size="13">学习 输入→输出 的映射</text>

  <text x="50" y="400" fill="#667eea" font-size="13" font-weight="bold">分类 Classification</text>
  <text x="55" y="420" fill="#888" font-size="12">• 逻辑回归、SVM、决策树</text>
  <text x="55" y="438" fill="#888" font-size="12">• 随机森林、KNN、神经网络</text>

  <text x="50" y="468" fill="#667eea" font-size="13" font-weight="bold">回归 Regression</text>
  <text x="55" y="488" fill="#888" font-size="12">• 线性回归、多项式回归</text>
  <text x="55" y="506" fill="#888" font-size="12">• 岭回归、Lasso</text>

  <text x="50" y="536" fill="#9090b0" font-size="12">🎯 垃圾邮件检测、房价预测</text>
  <text x="50" y="556" fill="#9090b0" font-size="12">🎯 图像识别、医疗诊断</text>

  <!-- ========== 2. 无监督学习 ========== -->
  <g filter="url(#shadow)">
    <rect x="310" y="270" width="260" height="320" rx="14" fill="#1a1a2e" stroke="#f093fb" stroke-width="1.5"/>
    <rect x="310" y="270" width="260" height="50" rx="14" fill="url(#unsupervised)"/>
    <rect x="310" y="306" width="260" height="14" fill="url(#unsupervised)"/>
  </g>
  <text x="340" y="302" fill="#fff" font-size="18" font-weight="bold">🔍 无监督学习</text>
  <text x="440" y="345" text-anchor="middle" fill="#b0b0d0" font-size="13">无标注数据，发现隐藏模式</text>
  <text x="440" y="365" text-anchor="middle" fill="#b0b0d0" font-size="13">自动寻找数据内在结构</text>

  <text x="330" y="400" fill="#f093fb" font-size="13" font-weight="bold">聚类 Clustering</text>
  <text x="335" y="420" fill="#888" font-size="12">• K-Means、DBSCAN</text>
  <text x="335" y="438" fill="#888" font-size="12">• 层次聚类、GMM</text>

  <text x="330" y="468" fill="#f093fb" font-size="13" font-weight="bold">降维 Dimensionality Reduction</text>
  <text x="335" y="488" fill="#888" font-size="12">• PCA、t-SNE、自编码器</text>
  <text x="335" y="506" fill="#888" font-size="12">• UMAP、LDA</text>

  <text x="330" y="536" fill="#9090b0" font-size="12">🎯 客户分群、异常检测</text>
  <text x="330" y="556" fill="#9090b0" font-size="12">🎯 推荐系统、数据可视化</text>

  <!-- ========== 3. 强化学习 ========== -->

  <g filter="url(#shadow)">
    <rect x="590" y="270" width="280" height="320" rx="14" fill="#1a1a2e" stroke="#4facfe" stroke-width="1.5"/>
    <rect x="590" y="270" width="280" height="50" rx="14" fill="url(#reinforcement)"/>
    <rect x="590" y="306" width="280" height="14" fill="url(#reinforcement)"/>
  </g>
  <text x="620" y="302" fill="#fff" font-size="18" font-weight="bold">🎮 强化学习</text>
  <text x="730" y="345" text-anchor="middle" fill="#b0b0d0" font-size="13">智能体与环境交互</text>
  <text x="730" y="365" text-anchor="middle" fill="#b0b0d0" font-size="13">通过奖惩信号学习最优策略</text>

  <text x="610" y="400" fill="#4facfe" font-size="13" font-weight="bold">基于价值 Value-Based</text>
  <text x="615" y="420" fill="#888" font-size="12">• Q-Learning、DQN</text>
  <text x="615" y="438" fill="#888" font-size="12">• SARSA</text>

  <text x="610" y="468" fill="#4facfe" font-size="13" font-weight="bold">基于策略 Policy-Based</text>
  <text x="615" y="488" fill="#888" font-size="12">• PPO、A3C、REINFORCE</text>
  <text x="615" y="506" fill="#888" font-size="12">• Actor-Critic、SAC</text>

  <text x="610" y="536" fill="#9090b0" font-size="12">🎯 游戏 AI（AlphaGo）</text>
  <text x="610" y="556" fill="#9090b0" font-size="12">🎯 机器人控制、自动驾驶</text>

  <!-- 底部补充说明 -->
  <rect x="30" y="598" width="840" height="2" fill="#fff" fill-opacity="0.08" rx="1"/>

  <!-- 额外类型小标签 -->
  <rect x="200" y="600" width="130" height="18" rx="9" fill="#43e97b" fill-opacity="0.15" stroke="#43e97b" stroke-width="0.8"/>
  <text x="265" y="613" text-anchor="middle" fill="#43e97b" font-size="10">半监督学习</text>

  <rect x="350" y="600" width="130" height="18" rx="9" fill="#ffd700" fill-opacity="0.15" stroke="#ffd700" stroke-width="0.8"/>
  <text x="415" y="613" text-anchor="middle" fill="#ffd700" font-size="10">自监督学习</text>

  <rect x="500" y="600" width="130" height="18" rx="9" fill="#ff6b6b" fill-opacity="0.15" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="565" y="613" text-anchor="middle" fill="#ff6b6b" font-size="10">迁移学习</text>

</svg>